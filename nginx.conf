server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — toutes les routes inconnues → index.html (routing côté client)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long terme pour les assets hashés par Vite
    location ~* \.(?:js|css|woff2?|ico|png|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache pour index.html (sinon la PWA ne se met jamais à jour)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
